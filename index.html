<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Demand Forecasting Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .bg-water {
      background: linear-gradient(180deg, #dff4ff 0%, #b9e6ff 100%);
    }
  </style>
</head>
<body class="bg-water min-h-screen p-8">
  <div class="max-w-6xl mx-auto bg-white/60 rounded-3xl shadow-2xl overflow-hidden border border-white/70">
    <div class="bg-blue-600 text-white px-8 py-5 text-3xl font-bold flex items-center gap-3">
      💧 <span>Water Demand Forecasting for Smart Cities</span>
    </div>

    <div class="p-10">
      <div class="grid md:grid-cols-2 gap-8">
        <!-- Login -->
        <div class="bg-gradient-to-b from-blue-700 to-sky-400 rounded-2xl p-8 shadow-xl text-white">
          <h2 class="text-3xl font-bold text-center mb-8">Admin Login</h2>
          <div class="space-y-4">
            <input type="email" placeholder="Email" class="w-full p-3 rounded-lg text-black outline-none" />
            <input type="password" placeholder="Password" class="w-full p-3 rounded-lg text-black outline-none" />
            <button class="w-full bg-blue-800 hover:bg-blue-900 py-3 rounded-lg font-bold text-xl">Login</button>
          </div>
          <div class="text-center my-4">OR</div>
          <button class="w-full bg-white text-gray-700 py-3 rounded-lg font-medium shadow">Sign in with Google</button>
          <p class="text-center mt-4">New user? Create Account</p>
        </div>

        <!-- Signup -->
        <div class="bg-white rounded-2xl p-8 shadow-xl">
          <h2 class="text-3xl font-bold text-blue-700 text-center mb-8">Create Account</h2>
          <div class="space-y-4">
            <input type="text" placeholder="Full Name" class="w-full p-3 border rounded-lg" />
            <input type="email" placeholder="Email" class="w-full p-3 border rounded-lg" />
            <input type="tel" placeholder="Phone Number" class="w-full p-3 border rounded-lg" />
            <input type="password" placeholder="Password" class="w-full p-3 border rounded-lg" />
            <button class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-bold text-xl">Sign Up</button>
          </div>
        </div>
      </div>

      <!-- Dashboard -->
      <h2 class="text-center text-4xl font-bold text-blue-700 mt-12 mb-8">Welcome to the Water Demand Dashboard!</h2>

      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl shadow-lg p-6">
          <h3 class="text-xl font-bold text-blue-700 mb-4">💧 Demand Forecast</h3>
          <p class="mb-4">Projected Usage: <b>220 million liters per day</b></p>
          <div class="h-40 bg-gradient-to-t from-sky-200 to-white rounded-lg flex items-end px-4 gap-4">
            <div class="w-8 h-16 bg-blue-400 rounded"></div>
            <div class="w-8 h-24 bg-blue-400 rounded"></div>
            <div class="w-8 h-20 bg-blue-400 rounded"></div>
            <div class="w-8 h-28 bg-blue-400 rounded"></div>
            <div class="w-8 h-36 bg-blue-400 rounded"></div>
          </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6">
          <h3 class="text-xl font-bold text-blue-700 mb-4">🏙 City Statistics</h3>
          <p class="mb-3">Population: <b>1.5 Million</b></p>
          <p class="mb-3">Current Usage: <b>200 ML per day</b></p>
          <p>Rainfall: <b>120 mm</b></p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
